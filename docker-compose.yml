services:
  #Image for apache, php, node
  web:
    build:
      context: ./images/web
      args:
        SSH_PASS: ${USER_PASSWORD:-password}
        SSH_USER: ${USER_LOGIN:-login}
        LARAVEL: ${LARAVEL:-false}
        YII: ${YII:-false}
        VUE: ${VUE:-false}
        REACT: ${REACT:-false}
        ANGULAR: ${ANGULAR:-false}
    privileged: true
    environment:
      - APACHE_RUN_USER=${USER_LOGIN:-login}
      - APACHE_RUN_GROUP=${USER_LOGIN:-login}
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
      - LC_CDPATH=/var/www/html
      - DB_HOST=${DB_HOST:-mariadb}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_NAME:-mvc}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root}
    restart: always
    container_name: ${USER_LOGIN:-login}_web
    volumes:
      - ./data:/var/www/html
      - ./images/web/start.sh:/usr/local/bin/start.sh:Z
      - ./images/web/sshd_config:/etc/ssh/sshd_config
    ports:
      - ${SSH_PORT:-22}:22
    networks:
      - apache-php-mysql-node-network

  #Image for mariadb
  mariadb:
    image: docker.io/library/mariadb:12.2
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-mvc}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    container_name: ${USER_LOGIN:-login}_mariadb
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - apache-php-mysql-node-network

  #Image for phpmyadmin
  phpmyadmin:
    image: docker.io/phpmyadmin/phpmyadmin
    restart: unless-stopped
    container_name: ${USER_LOGIN:-login}_phpmyadmin
    environment:
      - PMA_HOST=mariadb
      - PMA_ABSOLUTE_URI=http://localhost:8080/phpmyadmin
    depends_on:
      - mariadb
    networks:
      - apache-php-mysql-node-network

  #Image for proxy server
  proxy:
    build:
      context: ./images/proxy
      args:
        SERVER_NAME: ${SERVER_NAME:-localhost}
        WEB_PORT: ${WEB_PORT:-8080}
    container_name: ${USER_LOGIN:-login}_proxy
    restart: unless-stopped
    ports:
      - ${WEB_PORT:-8080}:80
    depends_on:
      - web
      - phpmyadmin
    networks:
      - apache-php-mysql-node-network

networks:
  apache-php-mysql-node-network:
    driver: bridge

volumes:
  mariadb_data:
